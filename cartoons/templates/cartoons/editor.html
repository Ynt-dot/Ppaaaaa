<!DOCTYPE html>
<html>
<head>
    <title>Редактор мультика</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'cartoons/css/style.css' %}">
</head>
<body>
    <div class="header">
        {% if user.is_authenticated %}
            Привет, {{ user.username }} | <a href="{% url 'logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'login' %}">Войти</a> | <a href="{% url 'register' %}">Регистрация</a>
        {% endif %}
    </div>
    
    <div class="container">
        <h1>{% if cartoon %}Редактировать "{{ cartoon.title }}"{% else %}Создать новый мульт{% endif %}</h1>
        
        <form method="post" id="editor-form">
            {% csrf_token %}
            <label>Название:</label>
            <input type="text" name="title" value="{{ cartoon.title|default:'' }}" required>
            
            <label>FPS (кадров в секунду):</label>
            <input type="number" name="fps" value="{{ cartoon.fps|default:12 }}" min="1" max="30">
            
            <div id="toolbar">
                <label>Цвет: <input type="color" id="color-picker" value="#000000"></label>
                <label>Толщина: <input type="range" id="brush-size" min="1" max="20" value="2"></label>
                <button type="button" id="clear-canvas" class="btn btn-secondary">Очистить холст</button>
                <button type="button" id="add-frame" class="btn">➕ Добавить кадр</button>
                <button type="button" id="copy-frame" class="btn btn-secondary">📋 Копировать кадр</button>
                <button type="button" id="delete-frame" class="btn btn-danger">❌ Удалить кадр</button>
            </div>
            
            <canvas id="draw-canvas" width="400" height="300"></canvas>
            
            <div id="frames-list"></div>
            
            <input type="hidden" name="frames" id="frames-input">
            <button type="submit" class="btn">💾 Сохранить мульт</button>
        </form>
    </div>
    
    {% if frames_json %}
    <script>
        var framesData = {{ frames_json|safe }};
    </script>
    {% endif %}
    <script src="{% static 'cartoons/js/editor.js' %}"></script>
</body>
</html>
