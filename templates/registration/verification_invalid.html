{% extends "base.html" %}

{% block title %}Ошибка подтверждения{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Ошибка</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <span style="font-size: 64px;">❌</span>
                </div>
                <h5>Не удалось подтвердить email</h5>
                <p class="text-muted">{{ message }}</p>
                <a href="{% url 'register' %}" class="btn btn-primary">Зарегистрироваться снова</a>
                <a href="{% url 'index' %}" class="btn btn-outline-secondary">На главную</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
