{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Восстановление пароля</h4>
            </div>
            <div class="card-body">
                <p>Введите ваш email, и мы отправим ссылку для сброса пароля.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" id="id_email" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Отправить</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    <a href="{% url 'login' %}">Вернуться ко входу</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
